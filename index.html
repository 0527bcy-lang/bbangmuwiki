<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이시이 요코 - 나무위키 스타일 프로필</title>
    <style>
        /* 기본 초기화 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #373a3c;
            background-color: #ffffff;
            padding: 15px;
        }

        /* 메인 컨테이너 */
        .wiki-container {
            max-width: 768px;
            margin: 0 auto;
        }

        /* 문서 제목 */
        .wiki-title {
            font-size: 32px;
            font-weight: normal;
            border-bottom: 1px solid #bbb;
            padding-bottom: 8px;
            margin-bottom: 10px;
        }

        /* 분류 박스 */ 
        .wiki-category-box {
            border: 1px solid #ccc;
            background: #fdfdfd;
            padding: 6px 10px;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .wiki-category-box span { font-weight: bold; }
        .wiki-category-box a { color: #0275d8; text-decoration: none; }

        /* ------------------------------------------------ */
        /* 🖤 사멸회유 참가자 틀 */
        /* ------------------------------------------------ */
        .wiki-frame {
            width: 100%;
            border: 1px solid #1a1a1a;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .frame-header {
            background: #000000;
            padding: 12px;
            text-align: center;
        }
        .frame-header img {
            max-width: 130px;
            height: auto;
            display: block;
            margin: 0 auto 4px auto;
        }
        .frame-toggle {
            background: #ffffff;
            color: #373a3c;
            text-align: center;
            padding: 5px;
            font-size: 13px;
            border-top: 1px solid #1a1a1a;
            border-bottom: 1px solid #1a1a1a;
            cursor: pointer;
            user-select: none;
        }
        .frame-body-content {
            display: block;
        }
        .frame-colony-title {
            background: #1a1a1a;
            color: #ffdf00;
            text-align: center;
            padding: 5px;
            font-weight: bold;
        }
        .frame-table {
            width: 100%;
            border-collapse: collapse;
        }
        .frame-table th {
            background: #000000;
            color: #ffdf00;
            padding: 8px 4px;
            border: 1px solid #1a1a1a;
            font-size: 12px;
            width: 80px;
        }
        .frame-table td {
            background: #ffffff;
            padding: 8px 10px;
            border: 1px solid #1a1a1a;
            font-size: 13px;
        }
        .txt-blue { color: #0056b3; font-weight: bold; }
        .txt-green { color: #228b22; font-weight: bold; }
        .txt-red { color: #8b0000; font-weight: bold; }
        .txt-purple { color: #800080; font-weight: bold; }
        .txt-neutral { color: #666666; font-weight: normal; }

        .frame-footer {
            background: #ffffff;
            padding: 8px;
            font-size: 12px;
            border-top: 1px solid #1a1a1a;
            text-align: center;
        }

        /* ------------------------------------------------ */
        /* 🎨 캐릭터 프로필 인포박스 */
        /* ------------------------------------------------ */
        .infobox-frame {
            border: 2px solid #CD5C5C;
            padding: 3px;
            background-color: #ffffff;
            margin-bottom: 25px;
            width: 100%;
        }
        .infobox {
            width: 100%;
            border: 1px solid #dbdbdb; 
            border-collapse: collapse;
            font-size: 14px;
            background: #ffffff;
        }
        .infobox th, .infobox td {
            border: 1px solid #dbdbdb;
            padding: 9px;
        }
        .infobox .title-cell {
            background-color: #CD5C5C; 
            color: #ffffff;
            font-size: 20px;
            text-align: center;
            padding: 12px;
        }
        .infobox .title-cell .sub-lang {
            font-size: 12px;
            display: block;
            margin-top: 4px;
            color: #f1f1f1;
        }
        .infobox .image-cell {
            text-align: center;
            padding: 15px;
        }
        .infobox .image-cell img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        .infobox .attr-name {
            background-color: #CD5C5C !important;
            color: #ffffff !important;
            font-weight: bold;
            width: 30%;
            text-align: center;
        }

        /* ------------------------------------------------ */
        /* 🗂️ 목차 스타일 */
        /* ------------------------------------------------ */
        .toc-container {
            border: 1px solid #ccc;
            background: #fdfdfd;
            padding: 14px;
            display: inline-block;
            min-width: 260px;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .toc-header { font-size: 16px; margin-bottom: 8px; }
        .toc-container ul { list-style: none; }
        .toc-container .sub-level { padding-left: 15px; font-size: 13px; margin-top: 4px; }
        .toc-container a { color: #373a3c; text-decoration: none; }
        .toc-container .toc-num { color: #0275d8; font-weight: bold; margin-right: 3px; }
        .toc-container .toc-num:hover { text-decoration: underline; }

        /* ------------------------------------------------ */
        /* 💬 개요 인용 상자 */
        /* ------------------------------------------------ */
        .quote-box {
            border: 1px solid #ccc;
            border-left: 5px solid #CD5C5C; 
            background-color: #f5fafd;
            padding: 15px;
            margin: 15px 0 20px 0;
        }
        .quote-line { font-size: 14px; font-weight: bold; color: #111; line-height: 1.5; }

        /* ------------------------------------------------ */
        /* 🔄 접기/펼치기 틀 */
        /* ------------------------------------------------ */
        .folding-box {
            border: 1px solid #ccc;
            margin: 10px 0 15px 0;
            width: 100%;
        }
        .folding-header {
            background: #f1f1f1;
            padding: 6px 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            user-select: none;
        }
        .folding-content {
            padding: 12px;
            display: none; 
            border-top: 1px solid #ccc;
            background: #ffffff;
        }
        .folding-content.open-active {
            display: block;
        }

        /* 본문 타이틀 텍스트 디자인 */
        .wiki-text h2 { font-size: 24px; border-bottom: 1px solid #ccc; padding-bottom: 3px; margin-top: 35px; margin-bottom: 12px; }
        .wiki-text h3 { font-size: 18px; margin-top: 20px; margin-bottom: 8px; }
        .wiki-text p { margin-bottom: 14px; text-align: justify; font-size: 14.5px; }
        
        .etc-items { padding-left: 15px; margin-bottom: 15px; }
        .etc-items li { margin-bottom: 8px; font-size: 14.5px; }

        /* 각주 기능 */
        .footnote { color: #0275d8; font-size: 11px; vertical-align: super; cursor: pointer; font-weight: bold; padding: 0 1px; }
        .footnote-popup { display: none; position: absolute; background: #373a3c; color: #fff; padding: 6px 10px; border-radius: 4px; font-size: 12px; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }

        /* [수정] 대사 칸 테두리와 같은 색상으로 맞춘 강조 태그 스타일 */
        .coral-tag {
            background-color: #fbeee9; /* 대사칸 배경처럼 연한 느낌 */
            color: #CD5C5C;           /* 대사칸 테두리와 같은 색상 */
            padding: 2px 6px; 
            border-radius: 4px; 
            font-weight: bold;
            display: inline-block;
        }
    </style>
</head>
